    personal_data:
      title: "Protección de datos personales"
      body: "De conformidad con el Reglamento General de Protección de Datos (RGPD — Reglamento UE 2016/679) y la Ley francesa de Protección de Datos (Loi Informatique et Libertés), Noventi SARL recopila y trata los datos personales necesarios para el funcionamiento del servicio. Los datos recopilados incluyen: dirección de correo electrónico e información de autenticación. Los usuarios tienen derecho de acceso, rectificación, supresión y portabilidad de sus datos personales, así como derecho a limitar u oponerse al tratamiento. Para ejercer estos derechos, contáctenos en contact@cutoptima.com. Para más información, puede contactar a la CNIL (Commission Nationale de l'Informatique et des Libertés) en www.cnil.fr."
    cookies:
      title: "Cookies"
      body: "El sitio cutoptima.com utiliza cookies. Para conocer el detalle de las cookies utilizadas y gestionar sus preferencias, consulte nuestra "
    liability:
