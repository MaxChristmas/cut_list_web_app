  faq:
    page_title: "FAQ — CutList"
    title: "Preguntas frecuentes"
    link: "FAQ"
    q1:
      question: "¿Cómo creo una lista de corte?"
      answer: "Introduzca las dimensiones de su panel base (largo × ancho) en la sección \"Panel base\", luego añada las piezas a cortar con sus dimensiones y cantidades. Dé un nombre a su proyecto si lo desea, y haga clic en \"Optimizar\" para generar el plan de corte óptimo."
    q2:
      question: "¿Cómo funciona la optimización?"
      answer: "El optimizador calcula la disposición más eficiente de sus piezas en los paneles base para minimizar el desperdicio. Utiliza un algoritmo avanzado que tiene en cuenta las dimensiones de las piezas, las cantidades y las restricciones opcionales como el grosor de la hoja, la dirección de la veta y la rotación. El resultado muestra cuántos paneles necesita y dónde colocar cada pieza."
    q3:
      question: "¿Qué es el grosor de la hoja (kerf)?"
      answer: "El grosor de la hoja corresponde al ancho de material eliminado por la sierra en cada corte. Al indicar este valor (en mm), el optimizador tiene en cuenta esta pérdida de material para obtener planes de corte más precisos. Este ajuste se encuentra en la sección Opciones."
    q4:
      question: "¿Cómo funciona la dirección de la veta?"
      answer: "Puede definir una dirección de veta en su panel base (a lo largo o a lo ancho) en las Opciones. Cada pieza puede indicar qué dimensión debe seguir la veta. Esto garantiza que las piezas se corten respetando el patrón de la veta de la madera, esencial para las superficies visibles."
    q5:
      question: "¿Puedo importar piezas desde un archivo CSV?"
      answer: "Sí, a partir del plan Worker. Haga clic en \"Importar CSV\" en la sección de piezas. Su archivo CSV debe contener columnas para largo, ancho y opcionalmente cantidad y etiqueta. Las piezas se añadirán a su lista actual."
    q6:
      question: "¿Cómo exporto mis resultados?"
      answer: "Puede exportar su plan de corte en PDF con medidas precisas y detalles de cada pieza mediante el botón \"Exportar PDF\". También puede imprimir etiquetas adhesivas en formatos estándar (24 o 30 etiquetas por página) mediante el botón \"Etiquetas\". Estas funciones están disponibles según su suscripción."
    q7:
      question: "¿Puedo editar manualmente la disposición?"
      answer: "Sí. Haga clic en \"Editar disposición\" para entrar en modo de edición. Puede arrastrar piezas para reposicionarlas dentro de un panel o transferirlas a otro panel. La detección de colisiones con el kerf evita la superposición. Haga clic en \"Guardar\" para guardar, o \"Restablecer original\" para volver a la disposición optimizada."
    q8:
      question: "¿Cuáles son los planes de suscripción?"
      answer: "CutList ofrece tres planes: Gratis (2 proyectos activos, 10 optimizaciones por proyecto por día, exportar PDF, etiquetas, dirección de corte, grosor de la hoja), Worker (10 proyectos, optimizaciones ilimitadas, importar CSV, imprimir etiquetas, mover piezas), y Empresa (proyectos y optimizaciones ilimitados, margen en paneles, archivar). También está disponible un acceso puntual de 3 días."
    q9:
      question: "¿Cómo gestiono mi cuenta?"
      answer: "Haga clic en su email en la barra lateral para acceder a los ajustes. Puede cambiar su contraseña, cambiar el idioma y gestionar su suscripción. También puede iniciar sesión con Google. Sus proyectos y datos se almacenan de forma segura y son accesibles desde cualquier dispositivo."
