    title: "Configuración de cookies"
    message: "Utilizamos cookies para garantizar el correcto funcionamiento de nuestro sitio y, con su consentimiento, para analizar el tráfico. Puede aceptar todas las cookies, rechazar las no esenciales o personalizar sus preferencias."
