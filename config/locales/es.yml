    analytics:
      title: "Cookies de análisis"
      description: "Estas cookies nos permiten medir el tráfico del sitio y comprender cómo los visitantes utilizan el sitio, para mejorar su rendimiento. Los datos se recopilan de forma anónima."
  cookies_policy:
    page_title: "Política de cookies — CutList"
    title: "Política de cookies"
    last_updated: "Última actualización: 16 de febrero de 2026"
    intro: "Bienvenido a la Política de cookies de CutList. Esta política explica cómo Noventi SARL («Noventi», «nosotros», «nuestro») utiliza cookies y tecnologías similares cuando visita o utiliza nuestro sitio web cutoptima.com y los servicios asociados (colectivamente, el «Sitio»)."
    link: "Política de cookies"
    what_are_cookies:
      title: "¿Qué son las cookies?"
      body: "Las cookies son pequeños archivos de texto que se colocan en su navegador o dispositivo cuando visita un sitio web. Ayudan al sitio a reconocer su dispositivo y a recordar cierta información sobre su visita, como sus preferencias, su estado de conexión o cómo utiliza el sitio. Además de las cookies, podemos utilizar tecnologías similares como balizas web, almacenamiento local y almacenamiento de sesión. Por simplicidad, nos referimos a todas estas tecnologías colectivamente como «Cookies» en esta política."
    how_we_use:
      title: "¿Cómo utilizamos las cookies?"
      body: "Utilizamos las Cookies para diversos fines: garantizar la seguridad y el correcto funcionamiento del Sitio, recordar sus preferencias, comprender cómo utiliza el Sitio y mejorar su experiencia general. Las Cookies nos ayudan a determinar si ya ha visitado el Sitio, le permiten permanecer conectado y nos permiten adaptar el servicio a sus necesidades."
    types:
      title: "Tipos de cookies que utilizamos"
      essential:
        title: "Cookies esenciales"
        body: "Estas Cookies son estrictamente necesarias para el correcto funcionamiento del Sitio. Sin ellas, las funcionalidades básicas como la autenticación, la gestión de sesiones y las protecciones de seguridad no funcionarían. Estas Cookies no pueden desactivarse."
        session: "Mantiene su sesión de usuario y su estado de conexión"
        remember: "Le mantiene conectado si selecciona «Recordarme»"
        csrf: "Protege contra ataques de falsificación de solicitudes entre sitios"
        consent: "Almacena sus preferencias de cookies"
      functionality:
        title: "Cookies de funcionalidad"
        body: "Las Cookies de funcionalidad nos permiten recordar las elecciones que realiza en el Sitio, como su preferencia de idioma o configuración de interfaz. Mejoran la usabilidad personalizando su experiencia."
        locale: "Recuerda su preferencia de idioma"
        cut_direction: "Guarda su dirección de corte preferida"
      analytics:
        title: "Cookies de rendimiento y análisis"
        body: "Las Cookies de rendimiento recopilan información agregada y anónima sobre cómo los visitantes utilizan el Sitio, como las páginas más visitadas. Utilizamos esta información para mejorar el funcionamiento del Sitio."
        ga: "Distingue usuarios únicos asignando un identificador generado aleatoriamente"
        gid: "Distingue usuarios con fines analíticos"
      third_party:
        title: "Cookies de terceros y de pago"
        body: "Cuando interactúa con ciertas funcionalidades del Sitio, proveedores terceros pueden colocar sus propias Cookies. Nuestro procesador de pagos Stripe puede colocar Cookies cuando accede a páginas relacionadas con el pago. También utilizamos Google OAuth para la autenticación."
        stripe_mid: "Prevención de fraude y procesamiento de pagos"
        stripe_sid: "Prevención de fraude y gestión de sesión de pago"
    table:
      cookie: "Cookie"
      provider: "Proveedor"
      purpose: "Finalidad"
      duration: "Duración"
    duration:
      session: "1 día"
      two_weeks: "2 semanas"
      one_year: "1 año"
      two_years: "2 años"
      twenty_four_hours: "24 horas"
      thirty_minutes: "30 minutos"
    your_choices:
      title: "Sus opciones sobre cookies"
      body: "Al visitar nuestro Sitio por primera vez, verá un banner de consentimiento de cookies que le permite aceptar o rechazar las Cookies no esenciales. La mayoría de los navegadores web también le permiten controlar las Cookies a través de su configuración. Tenga en cuenta que bloquear o eliminar ciertas Cookies puede afectar la funcionalidad del Sitio. Las Cookies esenciales no pueden desactivarse."
    gdpr:
      title: "Cookies y el RGPD"
      body: "Como empresa establecida en Francia (Nantes), cumplimos con el Reglamento General de Protección de Datos (RGPD) y la Directiva ePrivacy transpuesta al derecho francés, así como las directrices de la CNIL. Las Cookies esenciales se colocan sin consentimiento previo, ya que son estrictamente necesarias. Las Cookies no esenciales solo se colocan después de que haya dado su consentimiento informado. Puede retirar su consentimiento en cualquier momento. No utilizamos Cookies con fines publicitarios o de perfilado."
    how_long:
      title: "¿Cuánto tiempo permanecen las cookies en mi dispositivo?"
      body: "Las Cookies de sesión son temporales y se eliminan al cerrar el navegador. Las Cookies persistentes permanecen en su dispositivo durante un período determinado o hasta que las elimine manualmente. La duración de cada Cookie se especifica en las tablas anteriores."
    advertising:
      title: "¿Utilizamos cookies publicitarias?"
      body: "No. CutList no utiliza Cookies publicitarias y no muestra anuncios de terceros en el Sitio. No realizamos publicidad comportamental ni seguimiento entre sitios con fines de marketing."
    updates:
      title: "Actualizaciones de esta política"
      body: "Podemos actualizar esta Política de cookies periódicamente para reflejar cambios en nuestras prácticas, tecnologías o requisitos legales. Cuando realicemos cambios, actualizaremos la fecha de «Última actualización» en la parte superior de esta página."
    contact:
      title: "Contáctenos"
      body: "Si tiene alguna pregunta sobre esta Política de cookies, contáctenos:"
