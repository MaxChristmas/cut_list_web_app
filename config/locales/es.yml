      body: "Noventi SARL se esfuerza por garantizar la exactitud y actualización de la información publicada en cutoptima.com. Sin embargo, Noventi SARL no puede garantizar que la información sea completa, exacta o esté actualizada en todo momento. Noventi SARL no será responsable de ningún daño directo o indirecto derivado del acceso o uso del sitio, incluyendo cualquier pérdida de datos, daño a equipos o interrupciones del servicio."
    applicable_law:
      title: "Ley aplicable y jurisdicción"
      body: "El presente aviso legal se rige por la legislación francesa. Cualquier litigio derivado del uso del sitio cutoptima.com estará sujeto a la jurisdicción exclusiva de los tribunales competentes de Nantes, Francia, salvo disposición imperativa en contrario."
