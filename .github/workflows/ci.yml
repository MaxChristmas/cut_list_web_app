name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  rspec:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=5s --health-timeout=3s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Install JS dependencies
        run: npm install

      - name: Cache built assets
        uses: actions/cache@v4
        with:
          path: app/assets/builds
          key: assets-${{ hashFiles('app/javascript/**', 'app/assets/stylesheets/**', 'package.json') }}

      - name: Build assets
        run: |
          if [ ! -f app/assets/builds/application.js ]; then
            npm run build && npm run build:css
          fi

      - name: Prepare database
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
        run: bin/rails db:prepare

      - name: Run RSpec tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
        run: bundle exec rspec

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ scan_ruby, lint, rspec ]
    environment: production

    env:
      DOCKER_BUILDKIT: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Write .env.production
        run: |
          cat <<EOF > .env.production
          KAMAL_REGISTRY_PASSWORD=${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          CUT_LIST_WEB_APP_DATABASE_PASSWORD=${{ secrets.CUT_LIST_WEB_APP_DATABASE_PASSWORD }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY=${{ vars.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_WORKER_MONTHLY_PRICE_ID=${{ vars.STRIPE_WORKER_MONTHLY_PRICE_ID }}
          STRIPE_WORKER_YEARLY_PRICE_ID=${{ vars.STRIPE_WORKER_YEARLY_PRICE_ID }}
          STRIPE_ENTERPRISE_MONTHLY_PRICE_ID=${{ vars.STRIPE_ENTERPRISE_MONTHLY_PRICE_ID }}
          STRIPE_ENTERPRISE_YEARLY_PRICE_ID=${{ vars.STRIPE_ENTERPRISE_YEARLY_PRICE_ID }}
          STRIPE_WORKER_ONE_SHOT_PRICE_ID=${{ vars.STRIPE_WORKER_ONE_SHOT_PRICE_ID }}
          STRIPE_ENTERPRISE_ONE_SHOT_PRICE_ID=${{ vars.STRIPE_ENTERPRISE_ONE_SHOT_PRICE_ID }}
          SMTP_USER_NAME=${{ vars.SMTP_USER_NAME }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SENTRY_DSN=${{ vars.SENTRY_DSN }}
          NTFY_TOPIC=${{ vars.NTFY_TOPIC }}
          EOF
          sed -i 's/^[[:space:]]*//' .env.production

      - name: Write master key
        run: echo "${{ secrets.RAILS_MASTER_KEY }}" > config/master.key

      - name: Deploy with Kamal
        run: bundle exec kamal deploy
